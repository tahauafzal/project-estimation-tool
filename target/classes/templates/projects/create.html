<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Create Project - Alpha Estimation Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/projects">Alpha Estimation Tool</a>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3>Create New Project</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/projects/create}" th:object="${project}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Project Name</label>
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" th:field="*{startDate}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">End Date</label>
                        <input type="date" th:field="*{endDate}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Project</button>
                    <a href="/projects" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
