<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(template=~{::content})}">
<head><title>Project Details</title></head>
<body>
<div th:fragment="content">
    <h2 th:text="${project.name}">Project Name</h2>
    <p th:text="${project.description}">Description</p>
    
    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card bg-info text-white">
                <div class="card-body">
                    <h5>Total Cost Estimate</h5>
                    <h3>$<span th:text="${estimate.totalCost}"></span></h3>
                    <p>Final with buffer: $<span th:text="${estimate.finalCost}"></span></p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h5>Total Hours Estimate</h5>
                    <h3><span th:text="${estimate.totalHours}"></span> hrs</h3>
                    <p>Final with buffer: <span th:text="${estimate.finalHours}"></span> hrs</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="alert mt-3" th:classappend="${riskAssessment.contains('HIGH')} ? 'alert-danger' : 
                                            ${riskAssessment.contains('MEDIUM')} ? 'alert-warning' : 'alert-success'">
        <strong>Risk Assessment:</strong> <span th:text="${riskAssessment}"></span>
    </div>
    
    <a href="/projects" class="btn btn-secondary mt-3">Back to Projects</a>
</div>
</body>
</html>
