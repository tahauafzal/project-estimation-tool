<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(template=~{::content})}">
<head><title>Project Estimation</title></head>
<body>
<div th:fragment="content">
    <h2>Detailed Estimation: <span th:text="${project.name}"></span></h2>
    
    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <h4>Cost Summary</h4>
                    <hr>
                    <p><strong>Total Direct Cost:</strong> $<span th:text="${estimate.totalCost}"></span></p>
                    <p><strong>Buffer (20%):</strong> $<span th:text="${estimate.bufferCost}"></span></p>
                    <p><strong>Contingency (15%):</strong> $<span th:text="${estimate.contingencyCost}"></span></p>
                    <h3 class="mt-3">Final Estimate: $<span th:text="${estimate.finalCost}"></span></h3>
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="card bg-secondary text-white">
                <div class="card-body">
                    <h4>Hours Breakdown</h4>
                    <hr>
                    <p><strong>Direct Hours:</strong> <span th:text="${estimate.totalHours}"></span> hrs</p>
                    <p><strong>Buffer Hours:</strong> <span th:text="${estimate.bufferHours}"></span> hrs</p>
                    <p><strong>Contingency Hours:</strong> <span th:text="${estimate.contingencyHours}"></span> hrs</p>
                    <h4>Total Hours: <span th:text="${estimate.finalHours}"></span> hrs</h4>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row mt-4">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <h4>Task Breakdown</h4>
                    <table class="table table-striped">
                        <thead>
                            <tr><th>Task</th><th>Est. Hours</th><th>Status</th><th>Assigned To</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="task : ${tasks}">
                                <td th:text="${task.name}"></td>
                                <td th:text="${task.estimatedHours}"></td>
                                <td th:text="${task.status}"></td>
                                <td th:text="${task.assignedTo != null ? task.assignedTo.username : 'Unassigned'}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <a href="/projects" class="btn btn-secondary mt-3">Back to Projects</a>
</div>
</body>
</html>
