<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Projects - Alpha Estimation Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/projects">Alpha Estimation Tool</a>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>My Projects</h2>
            <a href="/projects/create" class="btn btn-primary">+ New Project</a>
        </div>
        
        <div class="row">
            <div th:each="project : ${projects}" class="col-md-6 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${project.name}">Project Name</h5>
                        <p class="card-text" th:text="${project.description}">Description</p>
                        <p><strong>Status:</strong> <span th:text="${project.status}"></span></p>
                        <p><strong>Total Estimate:</strong> $<span th:text="${project.totalCostEstimate}"></span></p>
                        <a th:href="@{/projects/{id}(id=${project.id})}" class="btn btn-sm btn-info">View Details</a>
                        <a th:href="@{/estimations/project/{id}(id=${project.id})}" class="btn btn-sm btn-success">Estimation</a>
                    </div>
                </div>
            </div>
            <div th:if="${projects.isEmpty()}" class="col-12">
                <div class="alert alert-info">No projects yet. Click "New Project" to create one!</div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
